spring.application.name=DeSubtitle

# 静态站点由 Java 从仓库根目录 web/ 自行提供；关闭 Boot 默认 classpath 静态映射（见 WebDirectoryResourceConfig）
spring.web.resources.add-mappings=false

# 服务端口默认由 config/lua/ports.lua 经 StartupLuaPorts 注入为 Spring 默认属性；此处若设置 server.port 或命令行传参可覆盖。

# SQLite：库文件统一放在项目下 data 目录根层（不再建子目录）
spring.datasource.url=jdbc:sqlite:data/desubtitle.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# 视频上传（POST /uploadVideo）；单文件上限可按部署调整
spring.servlet.multipart.max-file-size=512MB
spring.servlet.multipart.max-request-size=512MB

# 扫描并删除过期上传视频（expires_at）；毫秒
desubtitle.video.lifecycle-purge-interval-ms=15000

# 前端「视频去字幕」并行路数：经 GET /life 的 JSON 字段 videoProcessingLanes 下发，由浏览器动态生成组件（1–8，超出会被截断）
desubtitle.ui.video-processing-lanes=3

# 阿里云 EraseVideoSubtitles 擦除区域：bottom=不传参（官方默认仅画面底部约 25% 通栏）；full=全画面 0,0,1,1（字幕不在底部时必须用，否则看起来像「没去字幕」）。独立字幕轨（非烧录）本 API 无法消除，需在播放器关闭字幕轨。
desubtitle.aliyun.subtitle-erase-region=full

# 可选：独立前端开发服务器跨域来源（逗号分隔，如 http://localhost:5173）。留空则不启用 CORS（同机托管 web/ 时通常无需配置）。
# desubtitle.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
